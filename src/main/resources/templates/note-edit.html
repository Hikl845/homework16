<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Note</title>
</head>
<body>
<h1>Edit Note</h1>

<form action="/note/edit" method="post">
    <input type="hidden" name="id" th:value="${note.id}">

    <label>Title:</label>
    <input type="text" name="title" th:value="${note.title}">

    <label>Content:</label>
    <input type="text" name="content" th:value="${note.content}">

    <button type="submit">Save</button>
</form>
</body>
</html>
